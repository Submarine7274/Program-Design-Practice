<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Divide Practice</title>
</head>
<body>
    <h1>JavaScript Functions</h1>
    <p>A simple divide function</p>
    <input type="number" id="num1" placeholder="被除數 (d)">
    <input type="number" id="num2" placeholder="除數 (de)">
    <button onclick="calculateAndDisplay()">計算</button>
    <p id="demo">Enter two numbers</p>
    <script>

        function divideFunction(d, de) {
            if (typeof d !== 'number' || Number.isNaN(d) ||
                typeof de !== 'number' || Number.isNaN(de)) {
                return null; 
            }
            if (de === 0) {
                return null;
            }
            return d / de;
        }
        function calculateAndDisplay() {
            let input1 = document.getElementById("num1").value;
            let input2 = document.getElementById("num2").value;
            let d_val = parseFloat(input1);
            let de_val = parseFloat(input2);
            let result = divideFunction(d_val, de_val);
            if (result === null) {
                document.getElementById("demo").innerText = "計算錯誤：請輸入有效數字，且除數不可為零。";
            } else {
                document.getElementById("demo").innerText = "計算結果： " + result;
            }
        }
    </script>
</body>
</html>
